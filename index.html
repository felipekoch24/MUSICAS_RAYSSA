<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MÚSICAS DA RAY</title>

<style>
body{
    margin:0;
    background: linear-gradient(180deg,#0f001a,#2b0050);
    color:#fff;
    font-family:sans-serif;
}

header{
    text-align:center;
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

#search{
    width:90%;
    margin:10px auto;
    display:block;
    padding:12px;
    border-radius:20px;
    border:none;
}

#lista{
    padding-bottom:160px;
}

.music{
    display:flex;
    align-items:center;
    gap:15px;
    background:#2a004a;
    margin:10px;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
}

.music img{
    width:50px;
    height:50px;
    border-radius:8px;
}

/* PLAYER */
.player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#1a0033;
    padding:10px;
    text-align:center;
    z-index:10;
}

#cover{
    width:90px;
    border-radius:10px;
}

#agora{
    font-size:14px;
}

/* PROGRESSO */
.progress{
    width:90%;
    height:5px;
    background:#444;
    margin:10px auto;
    border-radius:5px;
    cursor:pointer;
}

.progress-bar{
    height:5px;
    background:#ff4fd8;
    width:0%;
}

/* TEMPO */
.time{
    font-size:12px;
    display:flex;
    justify-content:space-between;
    width:90%;
    margin:auto;
}

/* CONTROLES */
.controls{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:10px;
}

button{
    background:#ff4fd8;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    color:white;
    cursor:pointer;
}
</style>

</head>

<body>

<header>🎧 MÚSICAS DA RAY</header>

<input id="search" placeholder="🔍 Buscar música...">

<div id="lista"></div>

<div class="player">
    <img id="cover">
    <div id="agora">Nenhuma música</div>

```
<div class="time">
    <span id="tempoAtual">0:00</span>
    <span id="tempoTotal">0:00</span>
</div>

<div class="progress" onclick="seek(event)">
    <div class="progress-bar" id="barra"></div>
</div>

<div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="toggle()">⏯</button>
    <button onclick="next()">⏭</button>
    <button onclick="toggleRepeat()">🔁</button>
    <button onclick="toggleShuffle()">🔀</button>
</div>
```

</div>

<audio id="audio"></audio>

<script>

let musicas = [];
let filtradas = [];
let indexAtual = 0;
let repetir = false;
let shuffle = false;

const audio = document.getElementById("audio");
const lista = document.getElementById("lista");
const agora = document.getElementById("agora");
const cover = document.getElementById("cover");
const barra = document.getElementById("barra");

/* CARREGAR */
async function carregar(){
    const res = await fetch("musicas.json");
    musicas = await res.json();
    filtradas = musicas;
    render();

    // carregar última música
    const salvo = localStorage.getItem("musicaAtual");
    if(salvo){
        indexAtual = parseInt(salvo);
        play(indexAtual);
    }
}

/* CAPA REAL (iTunes API - funciona sem chave) */
async function getCapa(nome){
    try{
        const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(nome)}&limit=1`);
        const data = await res.json();
        return data.results[0]?.artworkUrl100 || "";
    }catch{
        return "";
    }
}

/* LISTA */
function render(){
    lista.innerHTML = "";

    filtradas.forEach(async (m,i)=>{
        const capa = await getCapa(m.nome);

        lista.innerHTML += `
        <div class="music" onclick="play(${i})">
            <img src="${capa}">
            <div>${m.nome}</div>
        </div>`;
    });
}

/* PLAY */
async function play(i){
    indexAtual = i;
    const m = filtradas[i];

    audio.src = m.link;
    audio.play();

    agora.innerText = m.nome;
    cover.src = await getCapa(m.nome);

    localStorage.setItem("musicaAtual", i);
}

/* CONTROLES */
function toggle(){
    audio.paused ? audio.play() : audio.pause();
}

function next(){
    if(shuffle){
        indexAtual = Math.floor(Math.random()*filtradas.length);
    }else{
        indexAtual++;
        if(indexAtual >= filtradas.length) indexAtual = 0;
    }
    play(indexAtual);
}

function prev(){
    indexAtual--;
    if(indexAtual < 0) indexAtual = filtradas.length - 1;
    play(indexAtual);
}

/* REPEAT */
function toggleRepeat(){
    repetir = !repetir;
    alert(repetir ? "🔁 Repetindo" : "➡️ Normal");
}

/* SHUFFLE */
function toggleShuffle(){
    shuffle = !shuffle;
    alert(shuffle ? "🔀 Aleatório ON" : "➡️ Ordem normal");
}

/* AUTO */
audio.onended = ()=>{
    if(repetir) play(indexAtual);
    else next();
};

/* TEMPO */
audio.ontimeupdate = ()=>{
    const cur = audio.currentTime;
    const dur = audio.duration;

    barra.style.width = (cur/dur)*100 + "%";

    document.getElementById("tempoAtual").innerText = format(cur);
    document.getElementById("tempoTotal").innerText = format(dur);
};

/* FORMATAR TEMPO */
function format(t){
    if(!t) return "0:00";
    const m = Math.floor(t/60);
    const s = Math.floor(t%60).toString().padStart(2,"0");
    return m+":"+s;
}

/* SEEK */
function seek(e){
    const w = e.currentTarget.clientWidth;
    audio.currentTime = (e.offsetX/w)*audio.duration;
}

/* BUSCA */
document.getElementById("search").addEventListener("input",(e)=>{
    const v = e.target.value.toLowerCase();
    filtradas = musicas.filter(m=>m.nome.toLowerCase().includes(v));
    render();
});

/* START */
carregar();

</script>

</body>
</html>
