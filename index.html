<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REPRODUTOR DE MÚSICA</title>

<style>
body{
    margin:0;
    color:#fff;
    font-family:sans-serif;
}

/* FUNDO */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background-size:cover;
    background-position:center;
    filter: blur(25px) brightness(0.4);
    z-index:-1;
}

/* HEADER */
header{
    text-align:center;
    padding:10px;
    font-size:20px;
}

/* TOTAL */
#totalMusicas{
    text-align:center;
    font-size:13px;
    opacity:0.8;
}

/* SEARCH */
#search{
    width:90%;
    margin:10px auto;
    display:block;
    padding:10px;
    border-radius:20px;
    border:none;
}

/* LISTA */
#lista{
    padding-bottom:180px;
}

.music{
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(0,0,0,0.4);
    margin:8px;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

.music img{
    width:45px;
    height:45px;
    border-radius:8px;
}

/* PLAYER */
.player{
    position:fixed;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.75);
    padding:10px;
    text-align:center;
}

/* CAPA */
#cover{
    width:100px;
    height:100px;
    object-fit:cover;
    border-radius:12px;
    margin:auto;
}

/* TEMPO */
.time{
    display:flex;
    justify-content:space-between;
    width:90%;
    margin:auto;
    font-size:12px;
}

/* PROGRESSO */
.progress{
    width:90%;
    height:5px;
    background:#444;
    margin:8px auto;
    border-radius:5px;
}

.progress-bar{
    height:5px;
    background:#ff4fd8;
    width:0%;
}

/* CONTROLES */
.controls{
    display:flex;
    justify-content:center;
    gap:8px;
}

button{
    background:#ff4fd8;
    border:none;
    padding:12px;
    border-radius:10px;
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<header>🎧 REPRODUTOR</header>
<div id="totalMusicas"></div>

<input id="search" placeholder="🔍 Buscar música...">

<div id="lista"></div>

<div class="player">
    <img id="cover">
    <div id="agora">Nenhuma música</div>

    <div class="time">
        <span id="tempoAtual">0:00</span>
        <span id="tempoTotal">0:00</span>
    </div>

    <div class="progress" onclick="seek(event)">
        <div class="progress-bar" id="barra"></div>
    </div>

    <div class="controls">
        <button onclick="prev()">⏮</button>
        <button onclick="toggle()">⏯</button>
        <button onclick="next()">⏭</button>
        <button id="btnRepeat" onclick="toggleRepeat()">🔁</button>
    </div>
</div>

<audio id="audio"></audio>

<script>

let musicas = [];
let filtradas = [];
let indexAtual = 0;
let repetir = false;

const audio = document.getElementById("audio");
audio.preload = "none";

const lista = document.getElementById("lista");
const agora = document.getElementById("agora");
const cover = document.getElementById("cover");
const barra = document.getElementById("barra");
const bg = document.getElementById("bg");
const btnRepeat = document.getElementById("btnRepeat");

const tempoAtual = document.getElementById("tempoAtual");
const tempoTotal = document.getElementById("tempoTotal");

const capaPadrao = "https://via.placeholder.com/300x300?text=Music";

/* CARREGAR */
async function carregar(){
    const res = await fetch("musicas.json");
    musicas = await res.json();
    filtradas = musicas;

    document.getElementById("totalMusicas").innerText =
        "🎧 " + musicas.length + " músicas";

    const salvo = localStorage.getItem("musicaIndex");

    render();

    if(salvo){
        indexAtual = parseInt(salvo);
        play(indexAtual);
    }
}

/* LISTA */
function render(){
    lista.innerHTML = "";

    filtradas.forEach((m,i)=>{
        lista.innerHTML += `
        <div class="music" onclick="play(${i})">
            <img src="${m.capa}" loading="lazy"
            onerror="this.src='${capaPadrao}'">
            <div>${m.nome}</div>
        </div>`;
    });
}

/* PLAY */
function play(i){
    indexAtual = i;
    const m = filtradas[i];

    audio.pause();
    audio.currentTime = 0;

    audio.src = m.link;
    audio.load();

    const p = audio.play();
    if(p !== undefined){
        p.catch(()=>{});
    }

    agora.innerText = m.nome;

    cover.src = m.capa;
    cover.onerror = ()=> cover.src = capaPadrao;

    bg.style.backgroundImage = `url('${m.capa}')`;

    localStorage.setItem("musicaIndex", i);
}

/* CONTROLES */
function toggle(){
    audio.paused ? audio.play() : audio.pause();
}

function next(){
    indexAtual++;
    if(indexAtual >= filtradas.length) indexAtual = 0;
    play(indexAtual);
}

function prev(){
    indexAtual--;
    if(indexAtual < 0) indexAtual = filtradas.length - 1;
    play(indexAtual);
}

/* REPEAT */
function toggleRepeat(){
    repetir = !repetir;

    if(repetir){
        btnRepeat.style.background = "#00ff88";
    }else{
        btnRepeat.style.background = "#ff4fd8";
    }
}

/* AUTO */
audio.onended = ()=>{
    repetir ? play(indexAtual) : next();
};

/* TEMPO */
audio.ontimeupdate = ()=>{
    if(audio.duration){
        barra.style.width = (audio.currentTime/audio.duration)*100 + "%";

        tempoAtual.innerText = format(audio.currentTime);
        tempoTotal.innerText = format(audio.duration);
    }
};

/* FORMAT */
function format(t){
    const m = Math.floor(t/60);
    const s = Math.floor(t%60).toString().padStart(2,"0");
    return m+":"+s;
}

/* SEEK */
function seek(e){
    const w = e.currentTarget.clientWidth;
    audio.currentTime = (e.offsetX/w)*audio.duration;
}

/* BUSCA */
document.getElementById("search").addEventListener("input",(e)=>{
    const v = e.target.value.toLowerCase();
    filtradas = musicas.filter(m=>m.nome.toLowerCase().includes(v));
    render();
});

/* START */
carregar();

</script>

</body>
</html>
