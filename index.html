<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REPRODUTOR DE MÚSICA</title>

<style>
body{
    margin:0;
    color:#fff;
    font-family:sans-serif;
}

.bg{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background-size:cover;
    background-position:center;
    filter: blur(25px) brightness(0.4);
    z-index:-1;
}

header{
    text-align:center;
    padding:10px;
    font-size:20px;
}

#totalMusicas{
    text-align:center;
    font-size:13px;
    opacity:0.8;
}

#search{
    width:90%;
    margin:10px auto;
    display:block;
    padding:10px;
    border-radius:20px;
    border:none;
}

#lista{
    padding-bottom:180px;
}

.music{
    display:flex;
    align-items:center;
    gap:10px;
    background:rgba(0,0,0,0.4);
    margin:8px;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

.music img{
    width:45px;
    height:45px;
    border-radius:8px;
}

.player{
    position:fixed;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.75);
    padding:10px;
    text-align:center;
}

#cover{
    width:100px;
    height:100px;
    object-fit:cover;
    border-radius:12px;
    margin:auto;
}

.time{
    display:flex;
    justify-content:space-between;
    width:90%;
    margin:auto;
    font-size:12px;
}

.progress{
    width:90%;
    height:5px;
    background:#444;
    margin:8px auto;
    border-radius:5px;
}

.progress-bar{
    height:5px;
    background:#ff4fd8;
    width:0%;
}

.controls{
    display:flex;
    justify-content:center;
    gap:8px;
}

button{
    background:#ff4fd8;
    border:none;
    padding:12px;
    border-radius:10px;
    color:white;
    font-size:16px;
}
</style>

</head>

<body>

<div class="bg" id="bg"></div>

<header>🎧 REPRODUTOR</header>
<div id="totalMusicas"></div>

<input id="search" placeholder="🔍 Buscar música...">

<div id="lista"></div>

<div class="player">
    <img id="cover">
    <div id="agora">Nenhuma música</div>

```
<div class="time">
    <span id="tempoAtual">0:00</span>
    <span id="tempoTotal">0:00</span>
</div>

<div class="progress" onclick="seek(event)">
    <div class="progress-bar" id="barra"></div>
</div>

<div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="toggle()">⏯</button>
    <button onclick="next()">⏭</button>
    <button id="btnRepeat" onclick="toggleRepeat()">🔁</button>
</div>
```

</div>

<audio id="audio" controls preload="metadata" playsinline></audio>

<script>

let musicas = [];
let filtradas = [];
let indexAtual = 0;
let repetir = false;

const audio = document.getElementById("audio");
audio.crossOrigin = "anonymous";
audio.preload = "metadata";

const lista = document.getElementById("lista");
const agora = document.getElementById("agora");
const cover = document.getElementById("cover");
const barra = document.getElementById("barra");
const bg = document.getElementById("bg");
const btnRepeat = document.getElementById("btnRepeat");

const tempoAtual = document.getElementById("tempoAtual");
const tempoTotal = document.getElementById("tempoTotal");

const capaPadrao = "https://via.placeholder.com/300x300?text=Music";

/* CARREGAR */
async function carregar(){
    const res = await fetch("musicas.json");
    musicas = await res.json();
    filtradas = [...musicas];

    document.getElementById("totalMusicas").innerText =
        "🎧 " + musicas.length + " músicas";

    render();
}

/* LISTA */
function render(){
    lista.innerHTML = "";

    filtradas.forEach((m,i)=>{
        lista.innerHTML += `
        <div class="music" onclick="play(${i})">
            <img src="${m.capa}" loading="lazy"
            onerror="this.src='${capaPadrao}'">
            <div>${m.nome}</div>
        </div>`;
    });
}

/* PLAY */
function play(i){
    const musica = filtradas[i];
    indexAtual = musicas.indexOf(musica);

    const m = musicas[indexAtual];

    audio.pause();
    audio.src = "";
    audio.load();

    setTimeout(()=>{
        audio.src = m.link;
        audio.load();

        let tentativa = audio.play();

        if (tentativa !== undefined) {
            tentativa.then(()=>{
                agora.innerText = "▶ " + m.nome;
            }).catch(()=>{
                agora.innerText = "⚠ toque para iniciar: " + m.nome;

                document.body.onclick = () => {
                    audio.play();
                };
            });
        }

    }, 200);

    cover.src = m.capa;
    cover.onerror = ()=> cover.src = capaPadrao;

    bg.style.backgroundImage = `url('${m.capa}')`;
}

/* CONTROLES */
function toggle(){
    if(audio.paused){
        audio.play().catch(()=>{
            document.body.onclick = () => audio.play();
        });
    } else {
        audio.pause();
    }
}

function next(){
    indexAtual++;
    if(indexAtual >= musicas.length) indexAtual = 0;
    play(indexAtual);
}

function prev(){
    indexAtual--;
    if(indexAtual < 0) indexAtual = musicas.length - 1;
    play(indexAtual);
}

/* REPEAT */
function toggleRepeat(){
    repetir = !repetir;
    btnRepeat.style.background = repetir ? "#00ff88" : "#ff4fd8";
}

/* AUTO */
audio.onended = ()=>{
    repetir ? play(indexAtual) : next();
};

/* TEMPO */
audio.ontimeupdate = ()=>{
    if(audio.duration){
        barra.style.width = (audio.currentTime/audio.duration)*100 + "%";

        tempoAtual.innerText = format(audio.currentTime);
        tempoTotal.innerText = format(audio.duration);
    }
};

function format(t){
    const m = Math.floor(t/60);
    const s = Math.floor(t%60).toString().padStart(2,"0");
    return m+":"+s;
}

/* SEEK */
function seek(e){
    const w = e.currentTarget.clientWidth;
    audio.currentTime = (e.offsetX/w)*audio.duration;
}

/* BUSCA */
document.getElementById("search").addEventListener("input",(e)=>{
    const v = e.target.value.toLowerCase();
    filtradas = musicas.filter(m=>m.nome.toLowerCase().includes(v));
    render();
});

/* START */
carregar();

</script>

</body>
</html>
