<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MÚSICAS DA RAY</title>

<style>
body{
    background: linear-gradient(180deg,#1a002a,#2b0050);
    color:#fff;
    font-family:sans-serif;
    text-align:center;
}

.music{
    background:#3a0066;
    margin:10px;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
}
.music:hover{
    background:#5a00a0;
}

.player{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#2b0050;
    padding:15px;
}

.controls{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:10px;
}

button{
    background:#ff4fd8;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

audio{
    width:100%;
    margin-top:10px;
}
</style>

</head>

<body>

<h2>🎧 MÚSICAS DA RAY</h2>

<div id="lista"></div>

<div class="player">
    <div id="agora">Nenhuma música</div>
    <audio id="audio" controls></audio>

```
<div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="toggleRepeat()">🔁</button>
    <button onclick="next()">⏭</button>
</div>
```

</div>

<script>

let musicas = [];
let indexAtual = 0;
let repetir = false;

const audio = document.getElementById("audio");
const agora = document.getElementById("agora");

async function carregar(){
    try{
        const res = await fetch("./musicas.json");
        musicas = await res.json();

        const div = document.getElementById("lista");
        div.innerHTML = "";

        musicas.forEach((m,i)=>{
            div.innerHTML += `
            <div class="music" onclick="play(${i})">
                ${m.nome}
            </div>`;
        });

    }catch(e){
        document.getElementById("lista").innerText = "❌ Erro ao carregar músicas";
        console.log(e);
    }
}

function play(i){
    indexAtual = i;
    audio.src = musicas[i].link;
    agora.innerText = musicas[i].nome;
    audio.play();
}

function next(){
    indexAtual = (indexAtual + 1) % musicas.length;
    play(indexAtual);
}

function prev(){
    indexAtual = (indexAtual - 1 + musicas.length) % musicas.length;
    play(indexAtual);
}

function toggleRepeat(){
    repetir = !repetir;
    alert(repetir ? "🔁 Repetindo" : "➡️ Normal");
}

audio.onended = ()=>{
    repetir ? play(indexAtual) : next();
};

carregar();

</script>

</body>
</html>
