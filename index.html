<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REPRODUTOR DE MÚSICA</title>

<style>
body{
    margin:0;
    background: linear-gradient(180deg,#0f001a,#2b0050);
    color:#fff;
    font-family:sans-serif;
}

header{
    text-align:center;
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

#search{
    width:90%;
    margin:10px auto;
    display:block;
    padding:12px;
    border-radius:20px;
    border:none;
}

.music{
    display:flex;
    align-items:center;
    gap:15px;
    background:#2a004a;
    margin:10px;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
}

.music img{
    width:50px;
    height:50px;
    border-radius:8px;
}

.player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#1a0033;
    padding:10px;
    text-align:center;
}

#cover{
    width:90px;
    border-radius:10px;
}

.progress{
    width:90%;
    height:5px;
    background:#444;
    margin:10px auto;
    border-radius:5px;
    cursor:pointer;
}

.progress-bar{
    height:5px;
    background:#ff4fd8;
    width:0%;
}

.controls{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

button{
    background:#ff4fd8;
    border:none;
    padding:10px;
    border-radius:10px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<header>🎧 REPRODUTOR DE MÚSICA</header>

<input id="search" placeholder="🔍 Buscar música...">

<div id="lista"></div>

<div class="player">
    <img id="cover">
    <div id="agora">Nenhuma música</div>

    <div class="progress" onclick="seek(event)">
        <div class="progress-bar" id="barra"></div>
    </div>

    <div class="controls">
        <button onclick="prev()">⏮</button>
        <button onclick="toggle()">⏯</button>
        <button onclick="next()">⏭</button>
        <button onclick="toggleRepeat()">🔁</button>
    </div>
</div>

<audio id="audio"></audio>

<script>

let musicas = [];
let filtradas = [];
let indexAtual = 0;
let repetir = false;

const audio = document.getElementById("audio");
const lista = document.getElementById("lista");
const agora = document.getElementById("agora");
const cover = document.getElementById("cover");
const barra = document.getElementById("barra");

// imagem padrão
const capaPadrao = "https://via.placeholder.com/300x300?text=Music";

/* CARREGAR */
async function carregar(){
    const res = await fetch("musicas.json");
    musicas = await res.json();
    filtradas = musicas;
    render();
}

/* LISTA */
function render(){
    lista.innerHTML = "";

    filtradas.forEach((m,i)=>{
        lista.innerHTML += `
        <div class="music" onclick="play(${i})">
            <img src="${capaPadrao}">
            <div>${m.nome}</div>
        </div>`;
    });
}

/* PLAY */
function play(i){
    indexAtual = i;
    const m = filtradas[i];

    audio.src = m.link;
    audio.load();
    audio.play();

    agora.innerText = m.nome;
    cover.src = capaPadrao;
}

/* CONTROLES */
function toggle(){
    audio.paused ? audio.play() : audio.pause();
}

function next(){
    indexAtual++;
    if(indexAtual >= filtradas.length) indexAtual = 0;
    play(indexAtual);
}

function prev(){
    indexAtual--;
    if(indexAtual < 0) indexAtual = filtradas.length - 1;
    play(indexAtual);
}

/* REPEAT */
function toggleRepeat(){
    repetir = !repetir;
    alert(repetir ? "🔁 Repetindo" : "➡️ Normal");
}

/* AUTO */
audio.onended = ()=>{
    if(repetir){
        play(indexAtual);
    } else {
        next();
    }
};

/* PROGRESSO */
audio.ontimeupdate = ()=>{
    const cur = audio.currentTime;
    const dur = audio.duration;
    barra.style.width = (cur/dur)*100 + "%";
};

/* SEEK */
function seek(e){
    const w = e.currentTarget.clientWidth;
    audio.currentTime = (e.offsetX/w)*audio.duration;
}

/* BUSCA */
document.getElementById("search").addEventListener("input",(e)=>{
    const v = e.target.value.toLowerCase();
    filtradas = musicas.filter(m=>m.nome.toLowerCase().includes(v));
    render();
});

/* START */
carregar();

</script>

</body>
</html>
