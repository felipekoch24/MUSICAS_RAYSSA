<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MÚSICAS DA RAY</title>

<style>
body{
    margin:0;
    background: linear-gradient(180deg,#0f001a,#2b0050);
    color:#fff;
    font-family:sans-serif;
}

/* HEADER */
header{
    text-align:center;
    padding:20px;
    font-size:22px;
    font-weight:bold;
}

/* BUSCA */
#search{
    width:90%;
    margin:10px auto;
    display:block;
    padding:12px;
    border-radius:20px;
    border:none;
    outline:none;
}

/* LISTA */
#lista{
    padding-bottom:140px;
}

.music{
    display:flex;
    align-items:center;
    gap:15px;
    background:#2a004a;
    margin:10px;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
}

.music:hover{
    background:#3f0070;
}

.music img{
    width:50px;
    height:50px;
    border-radius:8px;
}

/* PLAYER */
.player{
    position:fixed;
    bottom:0;
    width:100%;
    background:#1a0033;
    padding:10px;
    text-align:center;
    z-index:10;
}

#cover{
    width:80px;
    border-radius:10px;
}

#agora{
    margin-top:5px;
    font-size:14px;
}

/* BARRA */
.progress{
    width:90%;
    height:5px;
    background:#444;
    margin:10px auto;
    border-radius:5px;
    cursor:pointer;
}

.progress-bar{
    height:5px;
    background:#ff4fd8;
    width:0%;
    border-radius:5px;
}

/* CONTROLES */
.controls{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:10px;
}

button{
    background:#ff4fd8;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#ff79f0;
}
</style>

</head>

<body>

<header>🎧 MÚSICAS DA RAY</header>

<input id="search" placeholder="🔍 Buscar música...">

<div id="lista"></div>

<div class="player">
    <img id="cover" src="">
    <div id="agora">Nenhuma música</div>

```
<div class="progress" onclick="seek(event)">
    <div class="progress-bar" id="barra"></div>
</div>

<div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="toggle()">⏯</button>
    <button onclick="next()">⏭</button>
</div>
```

</div>

<audio id="audio"></audio>

<script>

let musicas = [];
let filtradas = [];
let indexAtual = 0;

const audio = document.getElementById("audio");
const lista = document.getElementById("lista");
const agora = document.getElementById("agora");
const cover = document.getElementById("cover");
const barra = document.getElementById("barra");

/* CARREGAR JSON */
async function carregar(){
    const res = await fetch("musicas.json");
    musicas = await res.json();
    filtradas = musicas;
    render();
}

/* CAPA AUTOMÁTICA (rápida) */
function getCapa(nome){
    return "https://picsum.photos/200?random=" + nome;
}

/* LISTA */
function render(){
    lista.innerHTML = "";

    filtradas.forEach((m,i)=>{
        lista.innerHTML += `
        <div class="music" onclick="play(${i})">
            <img src="${getCapa(m.nome)}">
            <div>${m.nome}</div>
        </div>`;
    });
}

/* PLAY */
function play(i){
    indexAtual = i;
    const m = filtradas[i];

    audio.src = m.link;
    audio.play();

    agora.innerText = m.nome;
    cover.src = getCapa(m.nome);
}

/* CONTROLES */
function toggle(){
    if(audio.paused) audio.play();
    else audio.pause();
}

function next(){
    indexAtual++;
    if(indexAtual >= filtradas.length) indexAtual = 0;
    play(indexAtual);
}

function prev(){
    indexAtual--;
    if(indexAtual < 0) indexAtual = filtradas.length - 1;
    play(indexAtual);
}

/* AUTO NEXT */
audio.onended = next;

/* PROGRESSO */
audio.ontimeupdate = ()=>{
    const p = (audio.currentTime / audio.duration) * 100;
    barra.style.width = p + "%";
}

/* SEEK */
function seek(e){
    const width = e.currentTarget.clientWidth;
    const click = e.offsetX;
    audio.currentTime = (click / width) * audio.duration;
}

/* BUSCA */
document.getElementById("search").addEventListener("input",(e)=>{
    const v = e.target.value.toLowerCase();
    filtradas = musicas.filter(m=>m.nome.toLowerCase().includes(v));
    render();
});

/* START */
carregar();

</script>

</body>
</html>
